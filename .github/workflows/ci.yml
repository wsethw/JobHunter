name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobhunter_test
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobhunter -d jobhunter_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy app tests

      - name: Tests
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85

      - name: Audit
        run: pip-audit -r requirements.txt

      - name: Docker Compose build
        run: docker compose --env-file .env.example build
